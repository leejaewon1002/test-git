<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>목표 | AI 학습 플래너</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="goals">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header container">
      <a class="logo" href="../index.html">AI 학습 플래너</a>
      <nav class="nav">
        <a href="../index.html">홈</a>
        <a href="planner.html">플래너</a>
        <a class="active" href="goals.html">목표</a>
        <a href="recommendations.html">추천</a>
      </nav>
    </header>

    <main class="container page-grid">
      <section class="card reveal">
        <h1>학습 목표 설정</h1>
        <form id="goalForm" class="form-grid">
          <label>
            주간 목표(시간)
            <input type="number" id="weeklyGoal" min="1" max="100" value="15" required />
          </label>
          <label>
            월간 목표(시간)
            <input type="number" id="monthlyGoal" min="1" max="400" value="60" required />
          </label>
          <label>
            이번 주 달성 시간
            <input type="number" id="weeklyDone" min="0" max="100" value="0" required />
          </label>
          <label>
            이번 달 달성 시간
            <input type="number" id="monthlyDone" min="0" max="400" value="0" required />
          </label>
          <button class="btn btn-primary" type="submit">목표 저장</button>
        </form>
      </section>

      <section class="card reveal">
        <h2>진행률</h2>
        <div class="progress-block">
          <p>주간 목표 달성률</p>
          <div class="progress">
            <div id="weeklyBar" class="bar"></div>
          </div>
          <p id="weeklyText" class="progress-text">0%</p>
        </div>
        <div class="progress-block">
          <p>월간 목표 달성률</p>
          <div class="progress">
            <div id="monthlyBar" class="bar"></div>
          </div>
          <p id="monthlyText" class="progress-text">0%</p>
        </div>
      </section>
    </main>

    <script src="../js/app.js"></script>
  </body>
</html>
