<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>플래너 | AI 학습 플래너</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="planner">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header container">
      <a class="logo" href="../index.html">AI 학습 플래너</a>
      <nav class="nav">
        <a href="../index.html">홈</a>
        <a class="active" href="planner.html">플래너</a>
        <a href="goals.html">목표</a>
        <a href="recommendations.html">추천</a>
      </nav>
    </header>

    <main class="container page-grid">
      <section class="card reveal">
        <h1>오늘의 학습 계획</h1>
        <form id="plannerForm" class="form-grid">
          <label>
            과목
            <input type="text" id="subject" placeholder="예: 수학" required />
          </label>
          <label>
            날짜
            <input type="date" id="studyDate" required />
          </label>
          <label>
            예상 시간(시간)
            <input type="number" id="hours" min="1" max="12" value="2" required />
          </label>
          <label>
            우선순위
            <select id="priority">
              <option value="높음">높음</option>
              <option value="중간" selected>중간</option>
              <option value="낮음">낮음</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">일정 추가</button>
        </form>
      </section>

      <section class="card reveal">
        <div class="section-row">
          <h2>내 학습 리스트</h2>
          <button id="clearPlanner" class="btn btn-ghost" type="button">전체 삭제</button>
        </div>
        <ul id="plannerList" class="list"></ul>
      </section>
    </main>

    <script src="../js/app.js"></script>
  </body>
</html>
