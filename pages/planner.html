<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>플래너 | AI 학습 플래너</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="planner">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header container">
      <a class="logo" href="../index.html">AI 학습 플래너</a>
      <nav class="nav">
        <a href="../index.html">홈</a>
        <a class="active" href="planner.html">플래너</a>
        <a href="goals.html">목표</a>
        <a href="recommendations.html">추천</a>
      </nav>
    </header>

    <main class="container page-grid">
      <section class="card reveal">
        <h1>오늘의 학습 계획</h1>
        <form id="plannerForm" class="form-grid">
          <label>
            과목
            <input type="text" id="subject" placeholder="예: 수학" required />
          </label>
          <label>
            과목 태그
            <select id="subjectTag">
              <option value="수학" selected>수학</option>
              <option value="영어">영어</option>
              <option value="코딩">코딩</option>
              <option value="과학">과학</option>
              <option value="기타">기타</option>
            </select>
          </label>
          <label>
            날짜
            <input type="date" id="studyDate" required />
          </label>
          <label>
            예상 시간(시간)
            <input type="number" id="hours" min="1" max="12" value="2" required />
          </label>
          <label>
            우선순위
            <select id="priority">
              <option value="높음">높음</option>
              <option value="중간" selected>중간</option>
              <option value="낮음">낮음</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">일정 추가</button>
        </form>
      </section>

      <section class="card reveal">
        <h2>커스텀 태그 추가</h2>
        <div class="custom-tag-form">
          <input type="text" id="customTagInput" placeholder="새 태그 입력 (예: 한문)" maxlength="15" />
          <button id="addCustomTag" class="btn btn-ghost" type="button">추가</button>
          <div id="customTagList" class="custom-tag-list"></div>
        </div>
      </section>

      <section class="card reveal">
        <div class="section-row">
          <h2>내 학습 리스트</h2>
          <button id="clearPlanner" class="btn btn-ghost" type="button">전체 삭제</button>
        </div>
        <div class="planner-filters">
          <label>
            우선순위 필터
            <select id="filterPriority">
              <option value="전체" selected>전체</option>
              <option value="높음">높음</option>
              <option value="중간">중간</option>
              <option value="낮음">낮음</option>
            </select>
          </label>
          <label>
            태그 필터
            <select id="filterTag">
              <option value="전체" selected>전체</option>
              <option value="수학">수학</option>
              <option value="영어">영어</option>
              <option value="코딩">코딩</option>
              <option value="과학">과학</option>
              <option value="기타">기타</option>
            </select>
          </label>
          <label>
            날짜 필터
            <input type="date" id="filterDate" />
          </label>
        </div>
        <ul id="plannerList" class="list"></ul>
      </section>

      <section class="card reveal planner-calendar-card">
        <div class="section-row">
          <h2>달력 뷰</h2>
          <div class="calendar-nav">
            <button id="prevMonth" class="btn btn-ghost" type="button">이전</button>
            <p id="calendarMonth" class="calendar-month"></p>
            <button id="nextMonth" class="btn btn-ghost" type="button">다음</button>
          </div>
        </div>
        <div class="calendar-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>

    <script src="../js/app.js"></script>
  </body>
</html>
