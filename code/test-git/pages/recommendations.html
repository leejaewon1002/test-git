<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>추천 | AI 학습 플래너</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="recommendations">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header container">
      <a class="logo" href="../index.html">AI 학습 플래너</a>
      <nav class="nav">
        <a href="../index.html">홈</a>
        <a href="planner.html">플래너</a>
        <a href="goals.html">목표</a>
        <a class="active" href="recommendations.html">추천</a>
      </nav>
    </header>

    <main class="container page-grid">
      <section class="card reveal">
        <h1>AI 맞춤 학습 추천</h1>
        <form id="recommendForm" class="form-grid">
          <label>
            현재 학습 수준
            <select id="level">
              <option value="초급">초급</option>
              <option value="중급" selected>중급</option>
              <option value="고급">고급</option>
            </select>
          </label>
          <label>
            하루 가능 시간(시간)
            <input type="number" id="availableHours" min="1" max="12" value="3" required />
          </label>
          <label>
            선호 학습 방식
            <select id="style">
              <option value="문제풀이">문제풀이</option>
              <option value="이론학습" selected>이론학습</option>
              <option value="혼합">혼합</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">추천 생성</button>
        </form>
      </section>

      <section class="card reveal">
        <h2>추천 결과</h2>
        <div id="recommendOutput" class="recommend-output">
          <p class="item-meta">학습 정보를 입력하고 추천을 생성해 보세요.</p>
        </div>
      </section>
    </main>

    <script src="../js/app.js"></script>
  </body>
</html>
